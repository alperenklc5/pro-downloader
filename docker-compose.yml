version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - API_KEYS=${API_KEYS}
      - DOWNLOAD_DIR=${DOWNLOAD_DIR:-/data/downloads}
      - FILE_RETENTION_HOURS=${FILE_RETENTION_HOURS:-24}
      - MAX_STORAGE_GB=${MAX_STORAGE_GB:-40}
      - MAX_CONCURRENT_DOWNLOADS=${MAX_CONCURRENT_DOWNLOADS:-3}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-2048}
      - MAX_VIDEO_DURATION_SECONDS=${MAX_VIDEO_DURATION_SECONDS:-7200}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    ports:
      - "8000"
    volumes:
      - downloads_data:/data/downloads
      - cookies_data:/data/cookies 
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      - API_KEYS=${API_KEYS}
      - DOWNLOAD_DIR=${DOWNLOAD_DIR:-/data/downloads}
      - FILE_RETENTION_HOURS=${FILE_RETENTION_HOURS:-24}
      - MAX_STORAGE_GB=${MAX_STORAGE_GB:-40}
      - MAX_CONCURRENT_DOWNLOADS=${MAX_CONCURRENT_DOWNLOADS:-3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - downloads_data:/data/downloads
      - cookies_data:/data/cookies
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A backend.tasks.celery_app worker --loglevel=info --concurrency=3

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A backend.tasks.celery_app beat --loglevel=info

volumes:
  redis_data:
  downloads_data:
  cookies_data:
